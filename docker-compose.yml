version: '3.8'

# NEXUS — Enterprise Critical-Incident Response & Coordination Platform
# One service per agent role (TRD §8). AGENT_ROLE env var selects the prompt
# and agent_id/api_key from config/agents.yaml at startup.
# The Band coordination layer is handled by the nexus-gateway service.

x-agent-defaults: &agent-defaults
  build: .
  restart: unless-stopped
  environment:
    - MONGODB_URI=mongodb://mongodb:27017/nexus
    - REDIS_URL=redis://redis:6379
    - GEMINI_API_KEY=${GEMINI_API_KEY}
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}
  depends_on:
    - mongodb
    - redis
  volumes:
    - ./config:/app/config:ro
    - ./src/agents/prompts:/app/src/agents/prompts:ro

services:
  # ── Gateway (intake + operator web view) ───────────────────────────────────
  nexus-gateway:
    <<: *agent-defaults
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}
      - NODE_ENV=${NODE_ENV:-development}

  # ── Agent services (one per role) ──────────────────────────────────────────
  agent-intake:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=intake-normalization
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  agent-correlation:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=correlation-dedup
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  agent-validation:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=validation-credibility
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}   # Claude cross-framework
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  agent-classification:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=classification
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  agent-severity:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=severity-blast-radius
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  agent-allocation:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=responder-allocation
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  agent-dep-sim:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=dependency-impact-sim
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  agent-mitigation:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=mitigation-projection
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  agent-runbook:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=runbook-advisor
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  agent-comms:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=stakeholder-comms
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  agent-commander:
    <<: *agent-defaults
    environment:
      - AGENT_ROLE=incident-commander
      - MONGODB_URI=mongodb://mongodb:27017/nexus
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_BASE_URL=${BAND_API_BASE_URL:-https://api.band.ai}

  # ── Infrastructure ─────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mongo-data:
  redis-data:

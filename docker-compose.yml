# Maestro — monolithic runtime (Express + React operator dashboard)
# Per-agent microservices described in config/agents.yaml are not implemented;
# use this compose file for local MongoDB + the single maestro app process.

version: '3.8'

services:
  maestro:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/maestro
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BAND_API_URL=${BAND_API_URL:-https://app.band.ai/api/v1/agent}
      - OPERATOR_API_KEY=${OPERATOR_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-me}
    depends_on:
      - mongodb
    volumes:
      - ./config:/app/config:ro

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - maestro_mongo_data:/data/db

volumes:
  maestro_mongo_data:

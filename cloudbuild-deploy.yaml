# Build + push the Maestro image with client-side VITE keys baked in.
# Runtime secrets (OPERATOR_API_KEY, JWT_SECRET, etc.) are set at deploy time.
# Usage: gcloud builds submit --config cloudbuild-deploy.yaml \
#          --substitutions=_MAPS=<maps_key>
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_GOOGLE_MAPS_API_KEY=${_MAPS}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/maestro-backend:latest'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/maestro-backend:latest']
images:
  - 'gcr.io/$PROJECT_ID/maestro-backend:latest'
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _MAPS: ''

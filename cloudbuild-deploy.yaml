# Build + push the Maestro image with client-side VITE keys baked in.
# Runtime secrets are set separately at `gcloud run deploy --image ... --env-vars-file`.
# Usage: gcloud builds submit --config cloudbuild-deploy.yaml \
#          --substitutions=_MAPS=<maps_key>,_OPKEY=<operator_key>
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_GOOGLE_MAPS_API_KEY=${_MAPS}'
      - '--build-arg'
      - 'VITE_OPERATOR_KEY=${_OPKEY}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/maestro-backend:latest'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/maestro-backend:latest']
images:
  - 'gcr.io/$PROJECT_ID/maestro-backend:latest'
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _MAPS: ''
  _OPKEY: ''
